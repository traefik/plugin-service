version: "2"
linters:
  default: all
  disable:
    - contextcheck
    - cyclop
    - depguard
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - inamedparam
    - ireturn
    - lll
    - mnd
    - noinlineerr
    - nlreturn
    - noctx
    - nonamedreturns
    - paralleltest
    - perfsprint
    - prealloc
    - rowserrcheck
    - sqlclosecheck
    - tagalign
    - testpackage
    - tparallel
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: not allowed
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package
    funlen:
      lines: -1
      statements: 50
    goconst:
      min-len: 5
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - sloppyReassign
        - unnamedResult
        - hugeParam
        - rangeValCopy
        - octalLiteral
        - paramTypeCombine
      enabled-tags:
        - diagnostic
        - style
        - performance
    gocyclo:
      min-complexity: 15
    godox:
      keywords:
        - FIXME
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - path: version.go
        text: '`(version|date|commit)` is a global variable'
      - linters:
          - funlen
          - maintidx
          - unused
        path: .*_test.go
      - path: pkg/handlers/module.go
        text: Function 'Download' is too long (.*)
      - path: pkg/handlers/module.go
        text: Function 'downloadGoProxy' is too long (.*)
      - path: pkg/handlers/module.go
        text: Function 'downloadGitHub' is too long (.*)
      - path: pkg/functions/public.go
        text: Function 'Public' is too long (.*)
      - path: main.go
        text: Function 'serveCommand' is too long (.*)
      - path: pkg/handlers/module.go
        text: Function 'Download' has too many statements (.*)
      - path: pkg/handlers/module.go
        text: cognitive complexity [0-9]+ of func `\(Handlers\).downloadGitHubFromAssets` is high (.*)
      - path: pkg/handlers/module.go
        text: cyclomatic complexity [0-9]+ of func `\(Handlers\).downloadGitHubFromAssets` is high (.*)
      - path: cmd/serve/serve.go
        text: cyclomatic complexity [0-9]* of func `setupEnvVars` is high (.*)
      - path: pkg/db/mongodb/plugindb.go
        text: Function 'SearchByName' is too long
      - path: internal/token/token.go
        text: 'json\(camel\): got ''userID'' want ''userId'''
      - path: (.+)\.go$
        text: 'ST1000: at least one file in a package should have a package comment'
      - path: (.+)\.go$
        text: 'package-comments: should have a package comment'
      - path: (.+)\.go$
        text: 'G114: Use of net/http serve function that has no support for setting timeouts'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
